<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Você, Com Todo Meu Amor ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a0612 0%, #4a1428 50%, #8b2450 100%);
            overflow: hidden;
            position: relative;
        }

        /* Partículas flutuantes */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            animation: containerFadeIn 1s ease-out;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .envelope-container {
            margin-bottom: 40px;
            animation: floatEnvelope 3s ease-in-out infinite;
        }

        @keyframes floatEnvelope {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .envelope-container a {
            display: block;
            transition: all 0.3s ease;
            filter: drop-shadow(0 10px 20px rgba(255, 100, 100, 0.3));
        }

        .envelope-container a:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 15px 30px rgba(255, 100, 100, 0.5));
        }

        #message {
            text-align: center;
            font-family: 'Raleway', sans-serif;
            color: #fff;
        }

        #message p {
            opacity: 0;
            animation: fadeInUp 1s ease-out forwards;
            margin: 10px 0;
        }

        #message p:nth-child(1) {
            animation-delay: 0.5s;
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #ffb3d9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #message p:nth-child(2) {
            animation-delay: 1s;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.9);
        }

        #message p:nth-child(3) {
            animation-delay: 1.5s;
            font-size: 16px;
            font-weight: 300;
            color: rgba(255, 200, 220, 0.8);
            margin-top: 25px;
            font-style: italic;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Efeito de brilho suave */
        @keyframes glow {
            0%, 100% {
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            }
            50% {
                box-shadow: 0 20px 80px rgba(255, 100, 150, 0.3);
            }
        }

        #container {
            animation: containerFadeIn 1s ease-out, glow 4s ease-in-out infinite;
        }

        /* Responsivo */
        @media (max-width: 600px) {
            #container {
                padding: 40px 30px;
                margin: 20px;
            }

            #message p:nth-child(1) {
                font-size: 24px;
            }

            #message p:nth-child(2) {
                font-size: 16px;
            }

            .envelope-container svg {
                width: 55px !important;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas flutuantes -->
    <script>
        for(let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.width = (Math.random() * 8 + 4) + 'px';
            particle.style.height = particle.style.width;
            document.body.appendChild(particle);
        }
    </script>

    <div id="container">
        <div class="envelope-container">
            <a href="page.html">
                <svg width="80" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" class="iconify iconify--twemoji" preserveAspectRatio="xMidYMid meet" fill="#000000">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier">
                        <path fill="#E8F4F8" d="M36 27a4 4 0 0 1-4 4H4a4 4 0 0 1-4-4V9a4 4 0 0 1 4-4h28a4 4 0 0 1 4 4v18z"></path>
                        <path fill="#B0C9D6" d="M11.949 17.636L.637 28.948c-.027.029-.037.064-.06.092c.34.57.814 1.043 1.384 1.384c.029-.023.063-.033.09-.06L13.365 19.05a1 1 0 0 0-1.416-1.414M35.423 29.04c-.021-.028-.033-.063-.06-.09L24.051 17.636a1 1 0 1 0-1.415 1.414l11.313 11.314c.026.026.062.037.09.06a3.978 3.978 0 0 0 1.384-1.384"></path>
                        <path fill="#B0C9D6" d="M32 5H4a4 4 0 0 0-4 4v1.03l14.527 14.496a4.883 4.883 0 0 0 6.885 0L36 10.009V9a4 4 0 0 0-4-4"></path>
                        <path fill="#FFFFFF" d="M32 5H4A3.992 3.992 0 0 0 .405 7.275l14.766 14.767a4 4 0 0 0 5.657 0L35.595 7.275A3.991 3.991 0 0 0 32 5"></path>
                        <path fill="#FF4D6D" d="M27 16.78a4.986 4.986 0 0 0-4.986-4.987a4.98 4.98 0 0 0-4.053 2.087a4.98 4.98 0 0 0-4.051-2.087a4.987 4.987 0 0 0-4.987 4.987c0 .391.05.769.134 1.133c.693 4.302 5.476 8.841 8.904 10.087c3.428-1.246 8.212-5.785 8.904-10.086c.085-.365.135-.744.135-1.134z"></path>
                    </g>
                </svg>
            </a>
        </div>

        <div id="message">
            <p>
                Clique no envelope para abrir
            </p>
            <p>Uma mensagem especial está esperando por você</p>
            <p id="date"></p>
        </div>
    </div>

    <script>
        // Atualizar data automaticamente
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const hoje = new Date().toLocaleDateString('pt-BR', options);
        document.getElementById('date').textContent = hoje.charAt(0).toUpperCase() + hoje.slice(1);
    </script>

</body>
</html>
